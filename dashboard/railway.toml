# Railway deployment for the Panel dashboard.
# Deploys /dashboard as a web service behind Railway's proxy.

[build]
builder = "DOCKERFILE"
dockerfilePath = "build/Dockerfile_dashboard"

[deploy]
startCommand = "uv run panel serve app.py --address 0.0.0.0 --port $PORT --allow-websocket-origin=*"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/"
healthcheckTimeout = 30

[env]
# Basic-auth protection is recommended; set PANEL_OAUTH_* or a reverse-proxy
# auth layer in the Railway environment, not in the repo.
