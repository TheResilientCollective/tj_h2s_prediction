# Tiered H2S Alert System — configuration
#
# Hard-gate thresholds: drawn from Cohen's d analysis (design §2, §3.4).
# Do NOT change without consulting the author.
#
# Score weights: initialized from Cohen's d values (design §2.3).
# Negative weights → lower value = higher risk (SBIWTP flow, wind speed, precipitation).
# Positive weights → higher value = higher risk (stable_atm, temp, dewpoint at 30 ppb).
#
# quiet_night_stats: means and standard deviations from quiet-night population
# (0 active stations, Nov 2023 – Apr 2026, night hours only).
# TODO(quiet_night_stats): re-derive from modeldata_h2s_nofill.parquet after
# each major dataset refresh. Run `backtest.py --emit-stats` to regenerate.

# --- Hard-gate thresholds ---
gates:
  tier_1:
    sbiwtp_flow_below_baseline_offset: 0.5   # flow < baseline - 0.5 MGD (i.e., < 23.0 MGD)
    sbiwtp_anomaly_threshold: 0.0            # anomaly < 0
  tier_2:
    wind_speed_threshold: 4.0               # wind_speed_mean < 4.0 m/s
    min_stations_passing_tier1: 2
  tier_3:
    temp_min_threshold: 13.0               # temp_min > 13 °C
    dewpoint_threshold: 11.0               # dewpoint_mean > 11 °C
    stable_atm_fraction_threshold: 0.6    # stable_atm_fraction > 0.6

# --- Per-tier score weights (Cohen's d values, sign per risk direction) ---
# TODO(weights): retrain logistic regression on labeled nights + daytime
# recalibration once >= 2 years of data accumulate (see design §8.6).
tiers:
  tier_1:
    score_weights:
      sbiwtp_flow_mgd:  -1.44   # lower flow → higher risk (d=-1.44)
      sbiwtp_anomaly:   -0.93   # negative anomaly → higher risk
      sbiwtp_sli:        0.63   # higher SLI → higher risk (d=+0.63)
      sbiwtp_deficit:    0.64   # larger deficit → higher risk
      precipitation:    -0.64   # less rain → higher risk
      flow_log:         -0.52   # lower border flow → higher risk
  tier_2:
    score_weights:
      sbiwtp_flow_mgd:  -1.44
      sbiwtp_anomaly:   -0.93
      sbiwtp_sli:        0.63
      sbiwtp_deficit:    0.64
      precipitation:    -0.64
      flow_log:         -0.52
      wind_speed_10m:   -0.58   # lower wind → higher risk
      wind_speed_min:   -0.53
      stable_atm:        0.38   # stable atm → higher risk
  tier_3:
    score_weights:
      sbiwtp_flow_mgd:  -1.44
      sbiwtp_anomaly:   -0.93
      sbiwtp_sli:        0.63
      sbiwtp_deficit:    0.64
      precipitation:    -0.64
      flow_log:         -0.52
      wind_speed_10m:   -0.58
      wind_speed_min:   -0.53
      stable_atm:        0.38
      temperature_2m:    0.70   # warmer nights → higher risk at 30 ppb (d=+0.70)
      dewpoint_2m:       0.50   # higher dewpoint → higher risk (d=+0.50)
      surface_pressure: -0.42   # lower pressure → higher risk (d=-0.42)

# --- Quiet-night feature statistics (used for z-score normalization) ---
