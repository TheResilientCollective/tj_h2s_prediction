# Tiered H2S Alert System — configuration
#
# Hard-gate thresholds: drawn from Cohen's d analysis (design §2, §3.4).
# Do NOT change without consulting the author.
#
# Score weights: initialized from Cohen's d values (design §2.3).
# Negative weights → lower value = higher risk (SBIWTP flow, wind speed, precipitation).
# Positive weights → higher value = higher risk (stable_atm, temp, dewpoint at 30 ppb).
#
# quiet_night_stats: means and standard deviations from quiet-night population
# (0 active stations, Nov 2023 – Apr 2026, night hours only).
# TODO(quiet_night_stats): re-derive from modeldata_h2s_nofill.parquet after
# each major dataset refresh. Run `backtest.py --emit-stats` to regenerate.

# --- Hard-gate thresholds ---
#
# Tier 1 was previously a SBIWTP deficit gate (flow < 23 MGD, anomaly < 0).
# In April 2026, SBIWTP flow jumped to 30–34 MGD (plant operating at surplus)
# while H2S events continued, driven by atmospheric conditions alone
# (stable_atm d=+1.48, wind_speed d=−1.37 on Apr-May 2026 events).
# Tier 1 is now a met-data availability check (wind_speed_10m not NaN).
# SBIWTP still contributes via the score weights below.
# See docs/datadiscussions/tiered_backtest_april2026_collapse.md
gates:
  tier_1:
    met_data_required: wind_speed_10m
  tier_2:
    wind_speed_threshold: 4.0               # wind_speed_mean < 4.0 m/s
    min_stations_passing_tier1: 2
  tier_3:
    temp_min_threshold: 13.0               # temp_min > 13 °C
    dewpoint_threshold: 11.0               # dewpoint_mean > 11 °C
    stable_atm_fraction_threshold: 0.6    # stable_atm_fraction > 0.6

# --- Per-tier score weights (Cohen's d values, sign per risk direction) ---
# Re-derived 2026-06-02 from full dataset (Oct 2024 – Jun 2026, n_events varies by tier).
# Night hours only (20:00–07:59 PT). See docs/datadiscussions/tiered_backtest_april2026_collapse.md
#
# Key changes vs original weights:
#   sbiwtp_flow_mgd: -1.44 → ~-0.16 to -0.29 (was 5-9× over-weighted; SBIWTP at surplus in 2026)
#   sbiwtp_anomaly:  -0.93 → ~-0.13 to 0.00 (near-zero signal; dropped from Tier 3)
#   flow_log:        -0.52 → +0.07 to +0.38 (sign flip: higher river flow = more events)
#   stable_atm:      +0.38 → +0.27 to +0.50 (strengthened at Tier 3; d=+0.50)
tiers:
  tier_1:
    # Uses Tier 2 weights so wind+stability can compensate for SBIWTP surplus.
    # When SBIWTP is at high flow (post-Apr 2026), SBIWTP-only weights suppress
    # the score; adding wind/stability lets the chain unlock on atmospheric events.
    score_weights:
      sbiwtp_flow_mgd:  -0.24
      sbiwtp_anomaly:   -0.13
      sbiwtp_sli:        0.19
      sbiwtp_deficit:    0.17
      precipitation:    -0.14
      flow_log:          0.17
      wind_speed_10m:   -0.34
      wind_speed_min:   -0.27
      stable_atm:        0.27
  tier_2:
    score_weights:
      sbiwtp_flow_mgd:  -0.24   # d=-0.24
      sbiwtp_anomaly:   -0.13   # d=-0.13
      sbiwtp_sli:        0.19   # d=+0.19
      sbiwtp_deficit:    0.17   # d=+0.17
      precipitation:    -0.14   # d=-0.14
      flow_log:          0.17   # d=+0.17
      wind_speed_10m:   -0.34   # d=-0.34
      wind_speed_min:   -0.27   # ~0.80 × wind_speed_10m
      stable_atm:        0.27   # d=+0.27
  tier_3:
    score_weights:
      sbiwtp_flow_mgd:  -0.16   # d=-0.16
      # sbiwtp_anomaly omitted: d=+0.03 (noise level, wrong-signed vs original weight)
      sbiwtp_sli:        0.13   # d=+0.13
      sbiwtp_deficit:    0.10   # d=+0.10
      precipitation:    -0.14   # d=-0.14
      flow_log:          0.38   # d=+0.38 (sign flip)
      wind_speed_10m:   -0.54   # d=-0.54 (strongest atmospheric signal)
      wind_speed_min:   -0.43   # ~0.80 × wind_speed_10m
      stable_atm:        0.50   # d=+0.50
      temperature_2m:    0.18   # d=+0.18
      dewpoint_2m:       0.30   # d=+0.30
      surface_pressure: -0.15   # d=-0.15

# --- Score firing thresholds ---
# single_station: used when only 1 station has valid met data (degraded mode).
# Set equal to multi_station for now — n=21 single-station events too sparse to
# calibrate tighter. Revisit after another summer season accumulates.
score_thresholds:
  multi_station:   0.5
  single_station:  0.5

