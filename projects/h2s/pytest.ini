[pytest]
# Pytest configuration for H2S prediction tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Coverage options
addopts =
    --verbose
    --tb=short
    --strict-markers
    -ra
    --cov=h2s
    --cov-report=term-missing
    --cov-report=html

# Markers
markers =
    s3: tests requiring S3 connection
    slow: tests that take more than 1 second
    integration: integration tests that test multiple components

# Ignore warnings from third-party packages
filterwarnings =
    ignore::DeprecationWarning:dagster.*
    ignore::DeprecationWarning:xgboost.*

# Minimum coverage percentage (fails if below this)
# Uncomment to enforce coverage minimums
# [tool:pytest]
# --cov-fail-under=80
